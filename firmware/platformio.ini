; PlatformIO project configuration
; Run "pio run -e esp32dev --target upload"  to flash the production build.
; Run "pio run -e test     --target upload"  to flash the single-display test harness.
; Run "pio device monitor  -e test"          to open the serial menu.

[platformio]
; Project root as src_dir lets each env choose its own subtree via
; build_src_filter.  Both envs still live in the same repo.
src_dir = .

; =============================================================================
; Shared settings inherited by both environments
; =============================================================================
[common]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SH110X
    adafruit/Adafruit MAX31855 library
    adafruit/Adafruit GFX Library
    adafruit/Adafruit BusIO
    me-no-dev/AsyncTCP
    me-no-dev/ESPAsyncWebServer
    ayushsharma82/WebSerial
build_flags = -Isrc

; =============================================================================
; Production build — multi-display PCB with TCA9548A mux
; =============================================================================
[env:esp32dev]
extends = common
; Compile only the src/ subtree (excludes test/)
build_src_filter = +<src/>

; =============================================================================
; OTA upload — uncomment these two lines when flashing over WiFi.
; Connect to "PajeroGauges" AP first, then run: pio run -e esp32dev -t upload
; Re-comment after flashing to restore USB upload as default.
; =============================================================================
; upload_protocol = espota
; upload_port = 192.168.4.1

; =============================================================================
; Test harness — single bare 1.3" SH1106 OLED (no mux, no sensors)
; Wire: SDA→GPIO21  SCL→GPIO22  VCC→3V3  GND→GND
;
; At runtime the serial monitor will display a menu — type the screen number
; and press Enter.  If nothing is received within 3 s the battery screen
; loads automatically.
; =============================================================================
[env:test]
extends = common
; Compile the test entry point + the shared screen modules (not src/main.cpp)
build_src_filter =
    +<test/>
    +<src/screens/>
    +<src/ota/>
