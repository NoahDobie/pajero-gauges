; PlatformIO project configuration
; Run "pio run" to build, "pio run --target upload" to flash.

[platformio]
; Source files live in the src directory
src_dir = src

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor baud rate (matches Serial.begin(115200) in firmware)
monitor_speed = 115200

; Library dependencies
; PlatformIO will fetch these automatically on first build.
lib_deps =
    adafruit/Adafruit SH110X
    adafruit/Adafruit SSD1306        ; TEMP — for 0.96" test display, remove when 1.3" SH1106 arrives
    adafruit/Adafruit GFX Library
    adafruit/Adafruit BusIO
